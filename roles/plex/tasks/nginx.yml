---
- name: Deploy nginx plex config
  template:
    src: plex.conf.j2
    dest: /etc/nginx/conf.d/plex.conf
    owner: "{{ plex_user }}"
    group: "{{ plex_group }}"
    mode: "0644"
  notify: restart nginx

- name: Set nginx server_names_hash_bucket_size
  lineinfile:
    path: /etc/nginx/nginx.conf
    insertafter: "include /etc/nginx/conf.d/\\*.conf;"
    line: "server_names_hash_bucket_size 64;"
    state: present
  notify: restart nginx

- name: Enable and start nginx
  service:
    name: nginx
    enabled: yes
    state: started
